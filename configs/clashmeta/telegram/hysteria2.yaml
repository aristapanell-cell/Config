  obfs-password: Masir_Sefid
proxy-groups:
- name: Proxy Select
  type: select
  proxies:
  - Auto Select
  - 'Hysteria2 #1'
  - 'Hysteria2 #2'
  - 'Hysteria2 #3'
  - DIRECT
- name: Auto Select
  type: url-test
  proxies:
  - 'Hysteria2 #1'
  - 'Hysteria2 #2'
  - 'Hysteria2 #3'
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 150
  lazy: true
