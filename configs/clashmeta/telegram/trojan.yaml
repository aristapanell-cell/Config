  type: trojan
  server: 127.0.0.1
  port: 40443
  password: humanity
  network: ws
  udp: true
  skip-cert-verify: false
  tcp-fast-open: true
  servername: www.ignitelimit.com
  client-fingerprint: chrome
  ws-opts:
    path: /assignment
    headers:
      Host: www.ignitelimit.com
