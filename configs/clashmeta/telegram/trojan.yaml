proxy-groups:
- name: Proxy Select
  type: select
  proxies:
  - Auto Select
  - 'Trojan #1'
  - 'Trojan #2'
  - 'Trojan #3'
  - 'Trojan #4'
  - 'Trojan #5'
  - 'Trojan #6'
  - DIRECT
- name: Auto Select
  type: url-test
  proxies:
  - 'Trojan #1'
  - 'Trojan #2'
  - 'Trojan #3'
