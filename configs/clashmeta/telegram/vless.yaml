  server: snapp.ir
  port: 2083
  uuid: 5b64b4cc-b4d9-4bb6-b36e-464f8876ce6c
  network: ws
  tls: true
  udp: true
  skip-cert-verify: false
  tcp-fast-open: true
  servername: like.abkeyping.click
  flow: ''
  client-fingerprint: chrome
  packet-encoding: xudp
  alpn:
  - h2
  - http/1.1
  ws-opts:
    path: /
    headers:
      Host: like.abkeyping.click
    max-early-data: 2048
    early-data-header-name: Sec-WebSocket-Protocol
